name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

# OIDC federated login to Azure (no stored credentials).
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    # Only runs once the Container Apps target is configured via repo variables.
    if: ${{ vars.AZURE_CONTAINERAPP_NAME != '' }}
    runs-on: ubuntu-latest
    env:
      RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      ACR_NAME: ${{ vars.AZURE_ACR_NAME }}
      APP_NAME: ${{ vars.AZURE_CONTAINERAPP_NAME }}
      JOB_NAME: ${{ vars.AZURE_CONTAINERAPP_JOB }}
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v5

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build & push image in ACR
        run: az acr build --registry "$ACR_NAME" --image "${APP_NAME}:${IMAGE_TAG}" .

      # Point the migration Job at the new image, then run it and WAIT. If migrations
      # fail, the step fails and the workflow stops — we never route traffic to a new
      # image against an un-migrated schema.
      - name: Run database migrations (and wait)
        run: |
          set -euo pipefail
          IMAGE="${ACR_NAME}.azurecr.io/${APP_NAME}:${IMAGE_TAG}"
          az containerapp job update \
            --resource-group "$RESOURCE_GROUP" --name "$JOB_NAME" \
            --image "$IMAGE" >/dev/null
          echo "Starting migration job $JOB_NAME ..."
          EXEC=$(az containerapp job start \
            --resource-group "$RESOURCE_GROUP" --name "$JOB_NAME" \
            --query name -o tsv)
          echo "Execution: $EXEC"
          # Poll until the execution leaves the Running/Unknown state.
          for _ in $(seq 1 60); do
            STATUS=$(az containerapp job execution show \
              --resource-group "$RESOURCE_GROUP" --name "$JOB_NAME" \
              --job-execution-name "$EXEC" --query properties.status -o tsv 2>/dev/null || echo "Unknown")
            echo "  status: $STATUS"
            case "$STATUS" in
              Succeeded) echo "migrations succeeded"; break ;;
              Failed|Degraded) echo "::error::migration job execution $EXEC $STATUS"; exit 1 ;;
              *) sleep 10 ;;
            esac
          done
          if [ "$STATUS" != "Succeeded" ]; then
            echo "::error::migration job did not complete in time (last status: $STATUS)"; exit 1
          fi

      - name: Deploy new revision
        run: |
          az containerapp update \
            --resource-group "$RESOURCE_GROUP" --name "$APP_NAME" \
            --image "${ACR_NAME}.azurecr.io/${APP_NAME}:${IMAGE_TAG}"
